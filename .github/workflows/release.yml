name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" --generate-notes --verify-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-pkg:
    # Build the macOS .pkg installer on both arm64 (macos-15) and Intel x64
    # (macos-13) runners and attach to the release stub created by the
    # `release` job. Public-repo macOS minutes are free.
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-13
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build .pkg (${{ matrix.arch }})
        # Downloads Node 24.12.0 darwin-${{ matrix.arch }}, rebuilds
        # better-sqlite3 against bundled Node ABI, trims devDeps, pkgbuild.
        # build-pkg.sh refuses cross-build, so the host arch must match.
        run: bash scripts/build-pkg.sh

      - name: Upload .pkg to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG_PATH=$(ls dist/Vessel-Backend-v*-${{ matrix.arch }}.pkg | head -1)
          if [ -z "$PKG_PATH" ] || [ ! -f "$PKG_PATH" ]; then
            echo "::error::No .pkg produced under dist/ for ${{ matrix.arch }}"
            exit 1
          fi
          echo "Uploading: $PKG_PATH ($(du -h "$PKG_PATH" | awk '{print $1}'))"
          gh release upload "${{ github.ref_name }}" "$PKG_PATH" --clobber
