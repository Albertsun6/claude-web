name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Protocol fixture tests
        run: pnpm test:protocol

      - name: dependency-cruiser one-way enforcement
        run: pnpm dep-cruiser:check

      - name: Frontend TypeScript build
        run: pnpm --filter @claude-web/frontend build

      # M2 Loop 7: backend regression + e2e tests in CI gate.
      # Each test is its own step so GHA UI shows pass/fail granularly.
      # Tests use mkdtemp for DB + cwd + DATA_DIR (Loop 4 LEARNINGS.md #6),
      # so no /home/runner persistent state pollution.
      # better-sqlite3 native binding rebuilds on ubuntu via pnpm install above.
      - name: Backend harness schema test (Phase 1-7, Loop 6 charter)
        run: pnpm --filter @claude-web/backend test:harness-schema

      - name: Backend scheduler orphan cleanup test (F + Loop 6 charter)
        run: pnpm --filter @claude-web/backend test:scheduler-cleanup

      - name: Backend scheduler failed reasons test (Loop 2 distribution)
        run: pnpm --filter @claude-web/backend test:scheduler-failed-reasons

      - name: Backend e2e happy-path test (Loop 4)
        run: pnpm --filter @claude-web/backend test:e2e-pipeline

      - name: Backend e2e failure-path test (Loop 5)
        run: pnpm --filter @claude-web/backend test:e2e-failures

      - name: Backend update-check unit tests
        run: pnpm --filter @claude-web/backend test:update-check

      - name: Protocol sync check
        run: |
          BASE=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          if [ -z "$BASE" ]; then
            echo "No parent commit, skipping diff check"
            exit 0
          fi
          PROTO=$(git diff --name-only "$BASE" HEAD | grep -cE \
            "packages/shared/src/protocol\.ts|packages/ios-native/Sources/ClaudeWeb/Protocol\.swift" \
            || true)
          FIXTURES=$(git diff --name-only "$BASE" HEAD | grep -c \
            "packages/shared/fixtures/protocol/" || true)
          if [ "$PROTO" -gt 0 ] && [ "$FIXTURES" -eq 0 ]; then
            echo "❌ protocol.ts or Protocol.swift changed but no fixture updated."
            echo "Please update packages/shared/fixtures/protocol/ to reflect the change."
            exit 1
          fi
          echo "✅ Protocol sync check passed"
