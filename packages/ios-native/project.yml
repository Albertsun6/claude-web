name: ClaudeWeb
options:
  bundleIdPrefix: com.albertsun6
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    DEVELOPMENT_TEAM: V84XLAQ28F
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "2"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    SWIFT_STRICT_CONCURRENCY: minimal

# MarkdownUI gives full markdown support (headings/lists/tables/code blocks
# with language-aware styling). MIT licensed, ~1k stars, ~3MB binary.
packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.0

targets:
  ClaudeWeb:
    type: application
    platform: iOS
    sources:
      - Sources/ClaudeWeb
    dependencies:
      - package: MarkdownUI
    info:
      path: Sources/ClaudeWeb/Info.plist
      properties:
        # Branded "Seaidea" — distinct from Anthropic's Claude trademark.
        # The app uses Claude (the AI) as its model backend but is not affiliated.
        CFBundleDisplayName: Seaidea
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Future-proof: declare these now so M3/M4 don't need re-generate.
        UIBackgroundModes:
          - audio
        NSMicrophoneUsageDescription: Seaidea needs your microphone for voice input.
        # Required when reaching the Mac mini over a LAN IP (vs Tailscale's
        # public-routable hostname). Without this, iOS 14+ silently blocks the
        # local-network connection until the user grants permission.
        NSLocalNetworkUsageDescription: Seaidea connects to your Mac running the backend on the local network.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.albertsun6.claudeweb-native
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only for v1
        SUPPORTS_MACCATALYST: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
