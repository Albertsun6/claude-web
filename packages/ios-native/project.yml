name: ClaudeWeb
options:
  bundleIdPrefix: com.albertsun6
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    DEVELOPMENT_TEAM: V84XLAQ28F
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  ClaudeWeb:
    type: application
    platform: iOS
    sources:
      - Sources/ClaudeWeb
    info:
      path: Sources/ClaudeWeb/Info.plist
      properties:
        # Renamed from "Claude" to avoid confusion with Anthropic's official
        # Claude app on Apple platforms.
        CFBundleDisplayName: Claude Voice
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Future-proof: declare these now so M3/M4 don't need re-generate.
        UIBackgroundModes:
          - audio
        NSMicrophoneUsageDescription: Claude Voice needs your microphone for voice input.
        # Required when reaching the Mac mini over a LAN IP (vs Tailscale's
        # public-routable hostname). Without this, iOS 14+ silently blocks the
        # local-network connection until the user grants permission.
        NSLocalNetworkUsageDescription: Claude Voice connects to your Mac running the claude-web backend on the local network.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.albertsun6.claudeweb-native
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only for v1
        SUPPORTS_MACCATALYST: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
