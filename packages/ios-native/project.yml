name: Vessel
options:
  bundleIdPrefix: com.albertsun6
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    DEVELOPMENT_TEAM: 23PRXWBRNH
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.2.2"
    CURRENT_PROJECT_VERSION: "59"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    SWIFT_STRICT_CONCURRENCY: minimal

# MarkdownUI gives full markdown support (headings/lists/tables/code blocks
# with language-aware styling). MIT licensed, ~1k stars, ~3MB binary.
packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.0

# M2-iOS-γ rename: target/scheme/bundle-id moved ClaudeWeb → Vessel.
# Source directories (Sources/ClaudeWeb, ClaudeWebTests, ClaudeWebUITests) are
# intentionally left at their old paths — per ADR-013, renaming source dirs
# triggers Swift module-cache churn + breaks every grep tooling that hard-codes
# the path. Only target identifiers and bundle IDs migrate here.
targets:
  Vessel:
    type: application
    platform: iOS
    sources:
      - Sources/ClaudeWeb
      - path: ../shared/fixtures/harness/fallback-config.json
        buildPhase: resources
        # M0 modelList Round single-source fallback (RFC §2.2):
        # backend imports the same JSON, iOS bundles a copy. Drift is impossible
        # because both ends decode the same bytes. xcodegen flattens the path so
        # HarnessStore.bundleFallback() finds it via url(forResource:withExtension:).
    dependencies:
      - package: MarkdownUI
    info:
      path: Sources/ClaudeWeb/Info.plist
      properties:
        # Branded "Seaidea" — distinct from Anthropic's Claude trademark.
        # The app uses Claude (the AI) as its model backend but is not affiliated.
        CFBundleDisplayName: Seaidea
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Future-proof: declare these now so M3/M4 don't need re-generate.
        UIBackgroundModes:
          - audio
        NSMicrophoneUsageDescription: Seaidea needs your microphone for voice input.
        # Required when reaching the Mac mini over a LAN IP (vs Tailscale's
        # public-routable hostname). Without this, iOS 14+ silently blocks the
        # local-network connection until the user grants permission.
        NSLocalNetworkUsageDescription: Seaidea connects to your Mac running the backend on the local network.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # M2-iOS-β: NWBrowser requires explicit Bonjour service declaration in
        # Info.plist (iOS 14+). Without this, browsing `_vessel._tcp` silently
        # returns no results.
        NSBonjourServices:
          - _vessel._tcp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.albertsun6.vessel
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only for v1
        SUPPORTS_MACCATALYST: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  VesselTests:
    type: bundle.unit-test
    platform: iOS
    sources: ClaudeWebTests
    dependencies:
      - target: Vessel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.albertsun6.vessel.tests
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UIDeviceFamily: "[1]"

  VesselUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: ClaudeWebUITests
    dependencies:
      - target: Vessel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.albertsun6.vessel.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UIDeviceFamily: "[1]"
        TEST_TARGET_NAME: Vessel
