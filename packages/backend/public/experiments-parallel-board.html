<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Eva Parallel Board (experimental)</title>
  <style>
    :root {
      --bg: #0e1116;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --ok: #3fb950;
      --warn: #d29922;
      --err: #f85149;
      --accent: #58a6ff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font: 13px/1.4 -apple-system, BlinkMacSystemFont, "SF Pro", system-ui, sans-serif; }
    header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 14px; margin: 0; font-weight: 600; }
    header .meta { color: var(--muted); font-size: 12px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 12px; padding: 12px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; }
    .card h2 { margin: 0 0 8px; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot.ok { background: var(--ok); }
    .dot.warn { background: var(--warn); }
    .dot.error, .dot.err { background: var(--err); }
    .dot.unknown { background: var(--muted); }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { padding: 4px 6px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: top; }
    th { color: var(--muted); font-weight: 500; }
    tr:last-child td { border-bottom: none; }
    code { font-family: "SF Mono", Menlo, monospace; font-size: 11px; color: var(--accent); background: rgba(88, 166, 255, 0.1); padding: 1px 4px; border-radius: 3px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .err-msg { color: var(--err); font-size: 11px; padding-top: 4px; }
    .empty { color: var(--muted); font-style: italic; }
    .auth-warn { background: var(--err); color: white; padding: 12px; margin: 12px; border-radius: 6px; }
    .badge { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: rgba(255,255,255,0.05); color: var(--muted); }
    .badge.ok { color: var(--ok); border: 1px solid var(--ok); }
    .badge.warn { color: var(--warn); border: 1px solid var(--warn); }
    .badge.err { color: var(--err); border: 1px solid var(--err); }
  </style>
</head>
<body>
  <header>
    <h1>Eva Parallel Board <span class="badge warn">experimental · throwaway</span></h1>
    <div class="meta" id="meta">loading…</div>
  </header>
  <div id="root">
    <div class="grid">
      <div class="card"><h2>loading</h2><p class="empty">fetching …</p></div>
    </div>
  </div>

  <script>
  // Token: 仅在 backend 返回 401 时才 prompt。dev 环境通常无 token，零摩擦。
  function getToken() {
    return localStorage.getItem('claude_web_token') || '';
  }
  function promptForToken() {
    const t = prompt('Backend returned 401. Enter CLAUDE_WEB_TOKEN (saved to localStorage):') || '';
    if (t) localStorage.setItem('claude_web_token', t);
    return t;
  }

  function statusDot(s) {
    const cls = ({ok:'ok', warn:'warn', error:'err', failure:'err', success:'ok', pending:'warn', unknown:'unknown'})[s] || 'unknown';
    return `<span class="dot ${cls}"></span>`;
  }

  function renderSection(title, section, renderItems) {
    const dot = statusDot(section.status);
    const err = section.errorMessage ? `<div class="err-msg">${section.errorMessage}</div>` : '';
    const body = section.items.length === 0
      ? `<p class="empty">none</p>`
      : renderItems(section.items);
    return `<div class="card"><h2>${dot} ${title} <span class="badge">${section.items.length}</span></h2>${body}${err}</div>`;
  }

  function renderWorktrees(items) {
    return `<table><thead><tr><th>path</th><th>branch</th><th>state</th></tr></thead><tbody>${
      items.map(w => `<tr><td><code>${w.path}</code></td><td>${w.branch}</td><td>${w.dirty ? '<span class="badge warn">dirty</span>' : '<span class="badge ok">clean</span>'}</td></tr>`).join('')
    }</tbody></table>`;
  }

  function renderBackends(items) {
    return `<table><thead><tr><th>port</th><th>role</th><th>health</th><th>harness</th></tr></thead><tbody>${
      items.map(b => `<tr><td>:${b.port}</td><td>${b.role}</td><td>${b.alive ? '<span class="badge ok">200</span>' : '<span class="badge err">down</span>'}</td><td>${b.harnessOk ? '<span class="badge ok">ok</span>' : '<span class="badge err">503</span>'}</td></tr>`).join('')
    }</tbody></table>`;
  }

  function renderPRs(items) {
    return `<table><thead><tr><th>#</th><th>title</th><th>base</th><th>ci</th></tr></thead><tbody>${
      items.map(p => `<tr><td><a href="${p.url}" target="_blank">#${p.number}</a></td><td>${p.title}</td><td><code>${p.baseBranch}</code></td><td>${statusDot(p.ciStatus)} ${p.ciStatus}</td></tr>`).join('')
    }</tbody></table>`;
  }

  function renderLocks(items) {
    return `<table><thead><tr><th>track</th><th>files</th><th>state</th><th>since</th></tr></thead><tbody>${
      items.map(l => `<tr><td>${l.track}</td><td><code>${l.files.join('<br>')}</code></td><td><span class="badge ${l.state === 'active' ? 'ok' : 'warn'}">${l.state}</span></td><td>${l.since}</td></tr>`).join('')
    }</tbody></table>`;
  }

  async function refresh() {
    try {
      let token = getToken();
      let res = await fetch('/api/experiments/parallel-board', {
        headers: token ? { Authorization: `Bearer ${token}` } : {},
      });
      if (res.status === 401) {
        token = promptForToken();
        if (!token) {
          document.getElementById('root').innerHTML = '<div class="auth-warn">401 Unauthorized — no token provided.</div>';
          return;
        }
        res = await fetch('/api/experiments/parallel-board', {
          headers: { Authorization: `Bearer ${token}` },
        });
      }
      if (!res.ok) {
        document.getElementById('root').innerHTML = `<div class="auth-warn">${res.status} ${res.statusText}</div>`;
        return;
      }
      const data = await res.json();
      document.getElementById('meta').textContent = `generated ${new Date(data.generatedAt).toLocaleTimeString()} · refresh 5s`;
      document.getElementById('root').innerHTML = `<div class="grid">
        ${renderSection('worktrees', data.worktrees, renderWorktrees)}
        ${renderSection('backends', data.backends, renderBackends)}
        ${renderSection('prs', data.prs, renderPRs)}
        ${renderSection('locks', data.locks, renderLocks)}
      </div>`;
    } catch (err) {
      document.getElementById('root').innerHTML = `<div class="auth-warn">fetch failed: ${err.message}</div>`;
    }
  }

  refresh();
  setInterval(refresh, 5000);
  </script>
</body>
</html>
